name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm check
      - name: Registry is in sync with component source
        run: |
          pnpm registry:build
          if [ -n "$(git status --porcelain static/r)" ]; then
            echo "::error::static/r is stale — run 'pnpm registry:build' and commit the result."
            git status --porcelain static/r
            git diff -- static/r
            exit 1
          fi
      - run: pnpm build
